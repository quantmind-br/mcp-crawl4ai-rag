services:
  # MCP Crawl4AI RAG Server
  mcp-server:
    build: 
      context: .
      dockerfile: Dockerfile
      args:
        - PORT=8051
    ports:
      - "8051:8051"
    env_file:
      - .env
    environment:
      - HOST=0.0.0.0
      - PORT=8051
      - TRANSPORT=sse
      - EMBEDDING_MODEL_API_BASE=http://ollama:11434/v1
      - NEO4J_URI=neo4j://neo4j:7687
    depends_on:
      ollama:
        condition: service_healthy
      neo4j:
        condition: service_healthy
    networks:
      - mcp-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8051/health", "||", "exit", "1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # Ollama Service for Local Embeddings with GPU Support
  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    environment:
      - OLLAMA_ORIGINS=*
      - OLLAMA_HOST=0.0.0.0
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
    networks:
      - mcp-network
    restart: unless-stopped
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Neo4j Database for Knowledge Graph
  neo4j:
    image: neo4j:5.24-community
    ports:
      - "7474:7474"  # HTTP
      - "7687:7687"  # Bolt
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
      - neo4j_import:/var/lib/neo4j/import
      - neo4j_plugins:/plugins
    environment:
      - NEO4J_AUTH=neo4j/Clara4014@
      - NEO4J_dbms_memory_heap_initial__size=512m
      - NEO4J_dbms_memory_heap_max__size=2G
      - NEO4J_dbms_memory_pagecache_size=1G
      - NEO4J_PLUGINS=["apoc"]
      - NEO4J_dbms_security_procedures_unrestricted=apoc.*
      - NEO4J_dbms_security_procedures_allowlist=apoc.*
    networks:
      - mcp-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "cypher-shell", "-u", "neo4j", "-p", "Clara4014@", "RETURN 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  # Model Initialization Service
  ollama-init:
    image: alpine/curl:latest
    depends_on:
      ollama:
        condition: service_healthy
    networks:
      - mcp-network
    environment:
      - OLLAMA_HOST=http://ollama:11434
    command: >
      sh -c "
        echo 'Pulling Qwen3-Embedding models...' &&
        echo 'Pulling Qwen3-Embedding-0.6B - Primary model...' &&
        curl -X POST http://ollama:11434/api/pull -d '{\"name\":\"dengcao/Qwen3-Embedding-0.6B:F16\"}' &&
        echo 'Qwen3-Embedding-0.6B pulled successfully!' &&
        echo 'Model pulled successfully! Using 0.6B as primary model.'
      "
    restart: "no"

volumes:
  ollama_data:
    driver: local
  neo4j_data:
    driver: local
  neo4j_logs:
    driver: local
  neo4j_import:
    driver: local
  neo4j_plugins:
    driver: local

networks:
  mcp-network:
    driver: bridge