services:
  # MCP Crawl4AI RAG Server
  mcp-server:
    build: 
      context: .
      dockerfile: Dockerfile
      args:
        - PORT=8051
    ports:
      - "8051:8051"
    env_file:
      - .env
    environment:
      - HOST=0.0.0.0
      - PORT=8051
      - TRANSPORT=sse
    networks:
      - mcp-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8051/health", "||", "exit", "1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

networks:
  mcp-network:
    driver: bridge